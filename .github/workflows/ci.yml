name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Add rustfmt + clippy
        run: rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2

      # eframe/egui needs X11, GTK and ALSA dev headers on Linux.
      - name: Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev libasound2-dev

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --workspace --release

      - name: Package Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: neardesk-windows
          path: target/release/neardesk.exe

      - name: Package macOS
        if: runner.os == 'macOS'
        run: tar -C target/release -czf neardesk-macos.tar.gz neardesk
      - name: Upload macOS
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: neardesk-macos
          path: neardesk-macos.tar.gz

      - name: Package Linux
        if: runner.os == 'Linux'
        run: tar -C target/release -czf neardesk-linux.tar.gz neardesk
      - name: Upload Linux
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: neardesk-linux
          path: neardesk-linux.tar.gz

  # On a green main build, publish a release when the crate version is new.
  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version tag
        id: ver
        run: |
          v=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          echo "tag=v$v" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$v" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        if: steps.ver.outputs.exists == 'false'
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        if: steps.ver.outputs.exists == 'false'
        run: cd dist && sha256sum * | tee SHA256SUMS.txt

      - name: Publish release
        if: steps.ver.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            dist/neardesk.exe
            dist/neardesk-macos.tar.gz
            dist/neardesk-linux.tar.gz
            dist/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            **NearDesk for Windows, macOS, and Linux.**

            - **Windows** — `neardesk.exe`, just run it.
            - **macOS** — `neardesk-macos.tar.gz`. Unzip, then clear the quarantine flag:
              `xattr -dr com.apple.quarantine neardesk && ./neardesk`
            - **Linux** — `neardesk-linux.tar.gz`. Needs a remote-desktop client for connecting
              (e.g. `sudo apt install -y freerdp3-x11`).

            Not code-signed yet, so Windows SmartScreen / macOS Gatekeeper may warn on first run.
            Verify your download against `SHA256SUMS.txt`.
