name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Add rustfmt + clippy
        run: rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2

      # eframe/egui needs X11, GTK and ALSA dev headers on Linux.
      - name: Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev libasound2-dev

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --workspace --release

      - name: Upload neardesk.exe
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: neardesk
          path: target/release/neardesk.exe

  # On a green main build, publish a release when the crate version is new.
  # Windows binary for now; macOS/Linux packaging is a later phase.
  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version tag
        id: ver
        run: |
          v=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          echo "tag=v$v" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$v" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download built exe
        if: steps.ver.outputs.exists == 'false'
        uses: actions/download-artifact@v8
        with:
          name: neardesk
          path: dist

      - name: Checksum
        if: steps.ver.outputs.exists == 'false'
        run: cd dist && sha256sum neardesk.exe | tee neardesk.exe.sha256

      - name: Publish release
        if: steps.ver.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            dist/neardesk.exe
            dist/neardesk.exe.sha256
          generate_release_notes: true
          body: |
            **Windows build of NearDesk.** Download `neardesk.exe` and run it on each PC — nothing else to install.

            Not code-signed yet, so Windows SmartScreen may warn on first run — choose **More info → Run anyway**.

            Verify the download: `CertUtil -hashfile neardesk.exe SHA256` should match `neardesk.exe.sha256`.

            macOS and Linux builds are in progress — for now build from source with `cargo build --release`.
