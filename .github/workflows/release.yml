name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: ./build.ps1
        shell: pwsh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/neardesk.exe
          generate_release_notes: true
